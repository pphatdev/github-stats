<svg width="48" height="48" viewBox="-3.84 -3.84 31.68 31.68" xmlns="http://www.w3.org/2000/svg">
    <style>
        @keyframes popup {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                transform: scale(1.2);
            }
            70% {
                transform: scale(0.9);
            }
            85% {
                transform: scale(1.05);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        @keyframes float {
            0%, 100% {
                filter: drop-shadow(0 0 8px rgba(100, 100, 100, 0.3));
            }
            25% {
                filter: drop-shadow(0 0 12px rgba(100, 100, 100, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 15px rgba(100, 100, 100, 0.6));
            }
            75% {
                filter: drop-shadow(0 0 12px rgba(100, 100, 100, 0.5));
            }
        }
        #unsplash-logo {
            animation: popup 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards, float 3s ease-in-out 0.6s infinite;
            transform-origin: center;
        }
    </style>
    <g id="unsplash-logo">
    <title>Unsplash</title><path d="M7.5 6.75V0h9v6.75h-9zm9 3.75H24V24H0V10.5h7.5v6.75h9V10.5z" fill="#61DAFB"/>
    </g>
</svg>