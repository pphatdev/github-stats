<svg width="48" height="48" viewBox="-2.4 -2.4 28.8 28.8" xmlns="http://www.w3.org/2000/svg">
    <style>
        @keyframes popup {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                transform: scale(1.2);
            }
            70% {
                transform: scale(0.9);
            }
            85% {
                transform: scale(1.05);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        @keyframes float {
            0%, 100% {
                filter: drop-shadow(0 0 8px rgba(0, 0, 0, 0.3));
            }
            25% {
                filter: drop-shadow(0 0 12px rgba(0, 0, 0, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.6));
            }
            75% {
                filter: drop-shadow(0 0 12px rgba(0, 0, 0, 0.5));
            }
        }
        #nextjs-logo {
            animation: popup 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards, float 3s ease-in-out 0.6s infinite;
            transform-origin: center;
        }
    </style>
    <g id="nextjs-logo">
    <title>Next.js</title><path d="M18.665 21.978C16.758 23.255 14.465 24 12 24 5.377 24 0 18.623 0 12S5.377 0 12 0s12 5.377 12 12c0 3.583-1.574 6.801-4.067 9.001L9.219 7.2H7.2v9.596h1.615V9.251l9.85 12.727Zm-3.332-8.533 1.6 2.061V7.2h-1.6v6.245Z" fill="#000000"/>
    </g>
</svg>