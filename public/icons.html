<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Animated Icons Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .icon-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .icon-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .icon-wrapper {
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .icon-name {
            color: white;
            font-size: 11px;
            text-align: center;
            word-break: break-word;
            font-weight: 500;
        }

        .stats {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.8;
        }

        .reload-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .reload-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎨 Animated Tech Icons Gallery</h1>
        <div class="grid" id="iconGrid"></div>
        <div class="stats" id="stats"></div>
    </div>
    <button class="reload-btn" onclick="location.reload()">🔄 Replay Animations</button>

    <script>
        const icons = [
            '7zip', 'apple', 'canonical', 'chartdotjs', 'claude', 'codecov', 'composer',
            'cplusplus', 'createreactapp', 'css', 'deno', 'denodeploy', 'devdotto',
            'digitalocean', 'dotnet', 'drizzle', 'ethereum', 'flutter', 'gatsby',
            'git', 'gitbook', 'github', 'gitkraken', 'gitlab', 'gitpod', 'googlegemini',
            'gsap', 'happycow', 'heroui', 'html', 'iconjar', 'javascript', 'jquery',
            'kotlin', 'kubernetes', 'laravel', 'less', 'mariadb', 'mariadbfoundation',
            'markdown', 'marko', 'mistralai', 'modelcontextprotocol', 'mongodb', 'mysql',
            'nestjs', 'nextjs', 'nginx', 'nodedotjs', 'nuxt', 'php', 'phpstorm',
            'postgresql', 'preact', 'primereact', 'rapid', 'react', 'reactos',
            'reactquery', 'reactrouter', 'remix', 'rust', 'samsung', 'sap', 'sass',
            'shadcnui', 'sharp', 'solid', 'spring', 'styledcomponents', 'svelte',
            'swift', 'tailwindcss', 'tanstack', 'threedotjs', 'tsnode', 'typescript',
            'ubuntu', 'unsplash', 'vim', 'vitess', 'vuedotjs', 'vuetify', 'vueuse',
            'warp', 'webassembly', 'xampp', 'xcode'
        ];

        const grid = document.getElementById('iconGrid');
        const stats = document.getElementById('stats');

        icons.forEach(icon => {
            const card = document.createElement('div');
            card.className = 'icon-card';

            const wrapper = document.createElement('div');
            wrapper.className = 'icon-wrapper';

            const img = document.createElement('img');
            img.src = `/assets/icons/${icon}.svg`;
            img.alt = icon;
            img.onerror = () => {
                wrapper.innerHTML = '❌';
                wrapper.style.fontSize = '32px';
            };

            const name = document.createElement('div');
            name.className = 'icon-name';
            name.textContent = icon;

            wrapper.appendChild(img);
            card.appendChild(wrapper);
            card.appendChild(name);
            grid.appendChild(card);
        });

        stats.textContent = `Total Icons: ${icons.length}`;
    </script>
</body>

</html>
