<svg width="48" height="48" viewBox="-10.2941 -10.2941 44.5884 44.5884" xmlns="http://www.w3.org/2000/svg">
            <style>
        @keyframes popup {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        @keyframes shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-2px, -2px) rotate(-1deg); }
            20% { transform: translate(2px, 2px) rotate(1deg); }
            30% { transform: translate(-2px, 2px) rotate(-1deg); }
            40% { transform: translate(2px, -2px) rotate(1deg); }
            50% { transform: translate(-1px, 1px) rotate(-0.5deg); }
            60% { transform: translate(1px, -1px) rotate(0.5deg); }
            70% { transform: translate(-2px, 0) rotate(-1deg); }
            80% { transform: translate(2px, 0) rotate(1deg); }
            90% { transform: translate(-1px, -1px) rotate(-0.5deg); }
        }
        #sharp-logo {
            animation: popup 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }
        #sharp-logo:hover {
            animation: shake 0.5s ease-in-out infinite;
        }
    </style>
    <g id="sharp-logo">
    <title>sharp</title><path fill="#61DAFB" d="M14.2209.0875v5.9613l-3.7433.5012v3.5233l3.7433-.5012v3.5735l3.492-.4672V9.1047L24 8.2634l-.4631-3.4613-5.824.7794V.0875zM6.287 1.145v5.9618L0 7.9483l.4634 3.4613 5.8514-.7834 3.4644-.4637V1.145zm3.5198 9.7185l-3.492.4675v3.578l-6.183.8276.4633 3.4613 5.8239-.7796v5.4942h3.492v-5.962l3.6114-.4834V13.944l-3.7156.4973zm13.73 1.7405l-5.824.779-3.492.4673v9.0179h3.492v-5.9618L24 16.0652Z" />
    </g>
</svg>