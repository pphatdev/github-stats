<svg width="48" height="48" viewBox="-10.2941 -10.2941 44.5884 44.5884" xmlns="http://www.w3.org/2000/svg">
            <style>
        @keyframes popup {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        @keyframes shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-2px, -2px) rotate(-1deg); }
            20% { transform: translate(2px, 2px) rotate(1deg); }
            30% { transform: translate(-2px, 2px) rotate(-1deg); }
            40% { transform: translate(2px, -2px) rotate(1deg); }
            50% { transform: translate(-1px, 1px) rotate(-0.5deg); }
            60% { transform: translate(1px, -1px) rotate(0.5deg); }
            70% { transform: translate(-2px, 0) rotate(-1deg); }
            80% { transform: translate(2px, 0) rotate(1deg); }
            90% { transform: translate(-1px, -1px) rotate(-0.5deg); }
        }
        #mongodb-logo {
            animation: popup 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }
        #mongodb-logo:hover {
            animation: shake 0.5s ease-in-out infinite;
        }
    </style>
    <g id="mongodb-logo">
    <title>MongoDB</title><path fill="currentColor" d="M17.193 9.555c-1.264-5.58-4.252-7.414-4.573-8.115-.28-.394-.53-.954-.735-1.44-.036.495-.055.685-.523 1.184-.723.566-4.438 3.682-4.74 10.02-.282 5.912 4.27 9.435 4.888 9.884l.07.05A73.49 73.49 0 0111.91 24h.481c.114-1.032.284-2.056.51-3.07.417-.296.604-.463.85-.693a11.342 11.342 0 003.639-8.464c.01-.814-.103-1.662-.197-2.218zm-5.336 8.195s0-8.291.275-8.29c.213 0 .49 10.695.49 10.695-.381-.045-.765-1.76-.765-2.405z" />
    </g>
</svg>