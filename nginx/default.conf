upstream stats_local {
    least_conn;
    server 127.0.0.1:3102;
}

upstream stats_fallback {
    least_conn;
    server github-stats-3hu8.onrender.com:443;
    server githubstats.up.railway.app:443;
}


server {
    listen 443 ssl;

    ssl_certificate /etc/letsencrypt/live/stats.sophat.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stats.sophat.top/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    server_name stats.pphat.top stats.sophat.top;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;


    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://stats_local;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_intercept_errors on;
        error_page 502 503 504 = @fallback;
    }

    location @fallback {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass https://stats_fallback;
        proxy_ssl_server_name on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
    }
}

server {
    listen 80;
    server_name stats.pphat.top stats.sophat.top;
    return 301 https://$host$request_uri;
}