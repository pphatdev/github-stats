<svg width="48" height="48" viewBox="-3.84 -3.84 31.68 31.68" xmlns="http://www.w3.org/2000/svg">
    <style>
        @keyframes popup {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                transform: scale(1.2);
            }
            70% {
                transform: scale(0.9);
            }
            85% {
                transform: scale(1.05);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        @keyframes float {
            0%, 100% {
                filter: drop-shadow(0 0 8px rgba(65, 184, 131, 0.3));
            }
            25% {
                filter: drop-shadow(0 0 12px rgba(65, 184, 131, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 15px rgba(65, 184, 131, 0.6));
            }
            75% {
                filter: drop-shadow(0 0 12px rgba(65, 184, 131, 0.5));
            }
        }
        #vuedotjs-logo {
            animation: popup 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards, float 3s ease-in-out 0.6s infinite;
            transform-origin: center;
        }
    </style>
    <g id="vuedotjs-logo">
    <title>Vue.js</title><path d="M24,1.61H14.06L12,5.16,9.94,1.61H0L12,22.39ZM12,14.08,5.16,2.23H9.59L12,6.41l2.41-4.18h4.43Z" fill="#41B883"/>
    </g>
</svg>