<svg width="48" height="48" viewBox="-3.84 -3.84 31.68 31.68" xmlns="http://www.w3.org/2000/svg">
    <style>
        @keyframes popup {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                transform: scale(1.2);
            }
            70% {
                transform: scale(0.9);
            }
            85% {
                transform: scale(1.05);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        @keyframes float {
            0%, 100% {
                filter: drop-shadow(0 0 8px rgba(2, 125, 242, 0.3));
            }
            25% {
                filter: drop-shadow(0 0 12px rgba(2, 125, 242, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 15px rgba(2, 125, 242, 0.6));
            }
            75% {
                filter: drop-shadow(0 0 12px rgba(2, 125, 242, 0.5));
            }
        }
        #flutter-logo {
            animation: popup 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards, float 3s ease-in-out 0.6s infinite;
            transform-origin: center;
        }
    </style>
    <g id="flutter-logo">
    <title>Flutter</title><path d="M14.314 0L2.3 12 6 15.7 21.684.013h-7.357zm.014 11.072L7.857 17.53l6.47 6.47H21.7l-6.46-6.468 6.46-6.46h-7.37z" fill="#027DF2"/>
    </g>
</svg>